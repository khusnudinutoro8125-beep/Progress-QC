<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cek Packing — Progress QC</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar"><div class="brand"><span class="dot"></span> Cek Packing</div></header>
<nav class="subnav">
  <a href="index.html">Input</a>
  <a href="packing.html" class="active">Packing</a>
  <a href="master.html">Master</a>
  <a href="monitor.html">Monitor</a>
</nav>
<main class="container">
  <div id="syncBar" class="syncbar hidden">
    <div class="syncbar-track"><div id="syncFill" class="syncbar-fill" style="width:100%"></div></div>
    <small id="syncText" class="muted"></small>
  </div>

  <div class="filterbar card">
    <label>Tujuan <select id="fTujuan"></select></label>
    <div class="filter-row">
      <label>Dari <input type="date" id="fFrom"></label>
      <label>Sampai <input type="date" id="fTo"></label>
    </div>
    <div class="filter-row">
      <label>Part Number <input type="text" id="fPart" placeholder="cari part…"></label>
      <button id="clearFilter" class="btn-small">Reset</button>
      <button id="fullReload" class="btn-small">Muat ulang penuh</button>
    </div>
    <div class="status-line"><span id="summary">Memuat…</span><span id="updated" class="updated"></span></div>
  </div>
  <div id="results"></div>
</main>
<div id="toast" class="toast"></div>
<script src="config.js"></script>
<script src="api.js"></script>
<script src="db.js"></script>
<script src="packing.js"></script>
</body>
</html>
